<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genmukai Gacha</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(circle at top, #2b2b55, #121222);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* FLOATING PARTICLES */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(white 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.05;
      animation: moveStars 60s linear infinite;
      z-index: 0;
    }

    @keyframes moveStars {
      from { transform: translateY(0); }
      to { transform: translateY(-1000px); }
    }

    .side {
      position: fixed;
      top: 0;
      height: 100%;
      width: 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      pointer-events: none;
      opacity: 0.4;
      z-index: 1;
    }

    .left { left: 0; }
    .right { right: 0; }

    .side img {
      width: 80px;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(255,255,255,0.04);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 5px;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    h2 {
      font-size: 1rem;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .probabilities {
      margin-bottom: 20px;
      font-size: 13px;
      background: rgba(255,255,255,0.05);
      padding: 10px 15px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .button {
      background: linear-gradient(45deg, gold, orange);
      color: black;
      padding: 15px 35px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 25px rgba(255,215,0,0.8);
      position: relative;
      overflow: hidden;
    }

    /* BUTTON SHINE */
    .button::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: 0.5s;
    }

    .button:hover::after {
      left: 100%;
    }

    .button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px gold;
    }

    .results {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      max-width: 520px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      transform: rotateY(90deg) scale(0.8);
      animation: reveal 0.5s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden; /* FIX glitch */
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }

    /* CARD SHINE */
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
      pointer-events: none;
    }

    .card:hover::before {
      animation: shine 0.6s forwards;
    }

    .card img {
      width: 65px;
      height: 65px;
      object-fit: cover;
      margin-bottom: 6px;
      border-radius: 8px;
    }

    .spinning {
      animation: spin 0.6s linear infinite;
    }

    .rare {
      background: linear-gradient(270deg, rgb(95, 212, 248));
      background-size: 400% 400%;
      box-shadow: 0 0 20px rgb(95, 212, 248);
      border: 1px solid rgb(95, 212, 248);
    }

    .epic {
      background: linear-gradient(135deg, rgb(157, 20, 220), rgb(157, 20, 220));
      box-shadow: 0 0 30px rgb(157, 20, 220);
      transform: scale(1.1);
      border: 1px solid rgb(157, 20, 220);
    }

    .legendary {
      background:rgb(188, 197, 59);
      color:rgb(253, 253, 253);
      box-shadow: 0 0 20px rgb(188, 197, 59);
    }

    .uncommon {
      background:rgb(25, 158, 43);
      color:rgb(253, 253, 253);
      box-shadow: 0 0 20px rgb(25, 158, 43);
    }

    .mythical {
      background:rgb(182, 44, 34);
      color:rgb(253, 253, 253);
      box-shadow: 0 0 20px rgb(182, 44, 34);
    }

    .exotic {
      background:rgb(223, 141, 34);
      color:rgb(253, 253, 253);
      box-shadow: 0 0 20px rgb(223, 141, 34);
    }

    .apex {
      background:rgb(112, 18, 18);
      color:rgb(253, 253, 253);
      box-shadow: 0 0 20px rgb(112, 18, 18);
    }

    .secret {
      background:rgb(161, 161, 151);
      color:rgb(24, 22, 22);
      box-shadow: 0 0 20px rgb(161, 161, 151);
    }

    .what {
      background-image: url("images2/rainbow-background.gif");
      background-size: cover;
      background-position: center;
      color: white;
     box-shadow: 0 0 15px rgb(255, 255, 255);
    }

    @keyframes reveal {
      0% { transform: rotateY(90deg) scale(0.5); opacity: 0; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>

    function getRandomWord() {
      const rand = Math.random();

      if (rand < 0.55) {
        return { ...commonWords[Math.floor(Math.random() * commonWords.length)], rarity: "common" }; 
      } else if (rand < 0.85) {
        return { ...uncommonWords[Math.floor(Math.random() * uncommonWords.length)], rarity: "uncommon" };
      } else if (rand < 0.9235) {
        return { ...rareWords[Math.floor(Math.random() * rareWords.length)], rarity: "rare" };
      } else if (rand < 0.968) {
        return { ...epicWords[Math.floor(Math.random() * epicWords.length)], rarity: "epic" };
      } else if (rand < 0.984) {
        return { ...legendaryWords[Math.floor(Math.random() * legendaryWords.length)], rarity: "legendary" };
      } else if (rand < 0.9907) {
        return { ...mythicalWords[Math.floor(Math.random() * mythicalWords.length)], rarity: "mythical" };
      } else if (rand < 0.9967) {
        return { ...exoticWords[Math.floor(Math.random() * exoticWords.length)], rarity: "exotic" };
      }  else if (rand < 0.9985) {
        return { ...apexWords[Math.floor(Math.random() * apexWords.length)], rarity: "apex" };
      } else if (rand < 0.9995) {
        return { ...secretWords[Math.floor(Math.random() * secretWords.length)], rarity: "secret" };
      } else {
        return { ...whatWords[Math.floor(Math.random() * whatWords.length)], rarity: "what" };
      }
      }

    async function pullTen() {
      const container = document.getElementById("results");
      container.innerHTML = "";

      let card = [];

      for (let i = 0; i < 10; i++) {
        const div = document.createElement("div");
        div.classList.add("card", "spinning");
        div.textContent = "?";
        container.appendChild(div);
        card.push(div);
      }

      for (let i = 0; i < 10; i++) {
        await new Promise(r => setTimeout(r, 150));

        const result = getRandomWord();
        const div = card[i];

        div.classList.remove("spinning");
        div.classList.remove("rare", "epic", "legendary", "mythical", "secret", "uncommon", "apex", "exotric", "what");

        if (result.rarity === "rare") div.classList.add("rare");
        if (result.rarity === "epic") div.classList.add("epic");
        if (result.rarity === "legendary") div.classList.add("legendary");
        if (result.rarity === "uncommon") div.classList.add("uncommon");
        if (result.rarity === "mythical") div.classList.add("mythical");
        if (result.rarity === "exotic") div.classList.add("exotic");
        if (result.rarity === "apex") div.classList.add("apex");
        if (result.rarity === "secret") div.classList.add("secret");
        if (result.rarity === "what") div.classList.add("what");

         div.innerHTML = `<img src="${result.img}"><div>${result.word}</div>`;
      }
    }
